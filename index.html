<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lawyer - مكتب فريد حسام</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">⚖️ AI Lawyer - فريد حسام</div>
</header>

<section class="hero">
  <h1>المستشار القانوني الذكي</h1>
  <p>احصل على استشارة أولية فورية لحالتك القانونية</p>
</section>

<section class="ai-section">
  <div class="ai-box">
    <h2>💬 اسأل محامي AI</h2>
    <textarea id="question" placeholder="اكتب مشكلتك القانونية هنا..."></textarea>
    <button onclick="askAI()">تحليل الحالة</button>
    <div id="answer"></div>
  </div>
</section>

<section class="services">
  <h2>الخدمات</h2>
  <div class="grid">
    <div class="card">قضايا مدنية</div>
    <div class="card">قضايا جنائية</div>
    <div class="card">قضايا أسرية</div>
    <div class="card">استشارات قانونية</div>
  </div>
</section>

<footer>
© 2026 AI Lawyer - مكتب فريد حسام
</footer>

<script src="script.js"></script>
</body>
</html>
